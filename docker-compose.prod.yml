# Production-oriented stack: Nginx edge -> API (Gunicorn+Uvicorn workers) + Taskiq worker + data stores.
# Copy .env from .env.example, set strong POSTGRES_PASSWORD and SECRET_KEY, and point DNS/TLS at your host.

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      -b 0.0.0.0:8000
      --timeout 120
      --access-logfile -
      --error-logfile -
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://svet:${POSTGRES_PASSWORD}@db:5432/svet
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: prod
    depends_on:
      - db
      - redis
      - qdrant
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: taskiq worker app.workers.broker:broker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://svet:${POSTGRES_PASSWORD}@db:5432/svet
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: prod
    depends_on:
      - db
      - redis
      - qdrant
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: svet
      POSTGRES_USER: svet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
